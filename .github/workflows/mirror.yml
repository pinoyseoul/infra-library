name: Mirror Engine - Catalogue Sync

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - 'mirror-list.txt'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      repository-projects: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: subtleazn
          password: ${{ secrets.ORG_MIRROR_TOKEN }}

      - name: Mirror & Dashboard Catalogue
        env:
          GH_TOKEN: ${{ secrets.ORG_MIRROR_TOKEN }}
          PROJECT_ID: "PVT_kwDOA4eG_84BS-up"
          SYNC_FIELD: "PVTF_lADOA4eG_84BS-upzhAXSzs"
          SHA_FIELD: "PVTF_lADOA4eG_84BS-upzhAYC0I"
          SIZE_FIELD: "PVTF_lADOA4eG_84BS-upzhAYC0M"
          CHAT_WEBHOOK: "https://chat.googleapis.com/v1/spaces/AAQAkDpGC70/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=J4PBk8Bp5ZGNaECMbR7bcaC8yxSUbWWFJcNEbOtCkgo"
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
          while IFS= read -r image || [ -n "$image" ]; do
            [[ -z "$image" || "$image" =~ ^# ]] && continue
            
            echo "::group::Processing $image"
            IMAGE_NAME=$(echo $image | awk -F"/" '{print $NF}')
            BASE_NAME=$(echo $IMAGE_NAME | cut -d":" -f1)
            TARGET_IMAGE="ghcr.io/pinoyseoul/$IMAGE_NAME"
            
            echo "Inspecting metadata..."
            UPSTREAM_DATA=$(docker buildx imagetools inspect "$image" --format "{{json .Manifest}}" 2>/dev/null || echo "error")
            LOCAL_DATA=$(docker buildx imagetools inspect "$TARGET_IMAGE" --format "{{json .Manifest}}" 2>/dev/null || echo "none")
            
            if [ "$UPSTREAM_DATA" = "error" ]; then
              echo "::error::Failed to inspect $image"
              # Simplified non-corrupt notification
              curl -X POST -H "Content-Type: application/json" -d "{\"text\":\"Mirror Failed: Could not inspect upstream image $image\"}" $CHAT_WEBHOOK
              echo "::endgroup::"
              continue
            fi

            UPSTREAM_DIGEST=$(echo $UPSTREAM_DATA | jq -r '.digest')
            LOCAL_DIGEST=$(echo $LOCAL_DATA | jq -r '.digest // empty')
            
            # MIRROR LOGIC
            if [ "$UPSTREAM_DIGEST" = "$LOCAL_DIGEST" ] && [ "$LOCAL_DIGEST" != "" ]; then
              echo "Up-to-date: $BASE_NAME"
              # Still need to get size if it's missing on the board
              IMAGE_SIZE="Unknown"
            else
              echo "Syncing $BASE_NAME..."
              docker pull -q "$image"
              docker tag "$image" "$TARGET_IMAGE"
              docker push "$TARGET_IMAGE"
              
              # Get Size after pull
              IMAGE_SIZE=$(docker image inspect "$image" --format '{{.Size}}' | awk '{print int($1/1048576) " MB"}')
              
              # Force Public Visibility via Link
              gh api --method PUT "orgs/pinoyseoul/packages/container/$BASE_NAME/repository" -F repository_id=1193855777 --silent || true
            fi
            
            # DASHBOARD SYNC
            ITEM_DATA=$(gh api graphql -f query='
              query($project: ID!) {
                node(id: $project) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        fieldValues(first: 10) {
                          nodes { ... on ProjectV2ItemFieldTextValue { text } }
                        }
                      }
                    }
                  }
                }
              }' -f project=$PROJECT_ID --jq ".data.node.items.nodes[] | select(.fieldValues.nodes[].text == \"$BASE_NAME\")")

            ITEM_ID=$(echo $ITEM_DATA | jq -r '.id // empty')

            if [ -z "$ITEM_ID" ]; then
              echo "Adding $BASE_NAME to board..."
              ITEM_ID=$(gh api graphql -f query='
                mutation($project: ID!, $title: String!) {
                  addProjectV2DraftIssue(input: {projectId: $project, title: $title}) {
                    projectItem { id }
                  }
                }' -f project=$PROJECT_ID -f title="$BASE_NAME" --jq '.data.addProjectV2DraftIssue.projectItem.id')
            fi

            # Update Dashboard values
            SHORT_SHA=$(echo $UPSTREAM_DIGEST | cut -c1-12)
            
            # Batch update field values
            gh api graphql -f query='
              mutation($p:ID!,$i:ID!,$f1:ID!,$v1:String!,$f2:ID!,$v2:String!) {
                m1: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f1,value:{text:$v1}}){projectV2Item{id}}
                m2: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f2,value:{text:$v2}}){projectV2Item{id}}
              }' -f p=$PROJECT_ID -f i=$ITEM_ID -f f1=$SYNC_FIELD -f v1="$NOW" -f f2=$SHA_FIELD -f v2="$SHORT_SHA"

            # Update Size if we have it
            if [ -n "$IMAGE_SIZE" ] && [ "$IMAGE_SIZE" != "Unknown" ]; then
               gh api graphql -f query='mutation($p:ID!,$i:ID!,$f:ID!,$v:String!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{text:$v}}){projectV2Item{id}}}' \
                 -f p=$PROJECT_ID -f i=$ITEM_ID -f f=$SIZE_FIELD -f v="$IMAGE_SIZE"
            fi

            docker rmi "$image" "$TARGET_IMAGE" 2>/dev/null || true
            echo "::endgroup::"
          done < mirror-list.txt
