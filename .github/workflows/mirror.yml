name: Mirror Engine - Catalogue Sync

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - 'mirror-list.txt'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      repository-projects: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: subtleazn
          password: ${{ secrets.ORG_MIRROR_TOKEN }}

      - name: Mirror & Dashboard Catalogue
        env:
          GH_TOKEN: ${{ secrets.ORG_MIRROR_TOKEN }}
          PROJECT_ID: "PVT_kwDOA4eG_84BS-up"
          SYNC_FIELD: "PVTF_lADOA4eG_84BS-upzhAXSzs"
          SHA_FIELD: "PVTF_lADOA4eG_84BS-upzhAYC0I"
          SIZE_FIELD: "PVTF_lADOA4eG_84BS-upzhAYC0M"
          CHAT_WEBHOOK: "https://chat.googleapis.com/v1/spaces/AAQAkDpGC70/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=J4PBk8Bp5ZGNaECMbR7bcaC8yxSUbWWFJcNEbOtCkgo"
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
          
          # Fetch board items including archived status
          echo "Fetching board items..."
          BOARD_ITEMS=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      isArchived
                      fieldValues(first: 10) {
                        nodes { ... on ProjectV2ItemFieldTextValue { text } }
                      }
                    }
                  }
                }
              }
            }' -f project=$PROJECT_ID --jq '.data.node.items.nodes')

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            
            # Parse source | target mapping
            source=$(echo "$line" | cut -d'|' -f1 | xargs)
            target_name=$(echo "$line" | cut -d'|' -f2 | xargs)
            
            if [ -z "$target_name" ]; then
                target_name=$(echo $source | awk -F"/" '{print $NF}' | cut -d':' -f1)
            fi

            echo "::group::Processing $target_name ($source)"
            
            tag=$(echo $source | awk -F":" '{print $NF}')
            [[ "$tag" == "$source" ]] && tag="latest"
            TARGET_IMAGE="ghcr.io/pinoyseoul/$target_name:$tag"
            
            # FALLBACK VALUES
            UPSTREAM_DIGEST="unknown"
            IMAGE_SIZE="N/A"

            echo "Inspecting $source metadata..."
            # Use file-based capture to prevent shell mangling
            if docker buildx imagetools inspect "$source" --format "{{json .}}" > metadata.raw 2>/dev/null; then
                # Safe JSON parsing using Slurp mode
                if jq -s . metadata.raw >/dev/null 2>&1; then
                    UPSTREAM_DIGEST=$(jq -s -r 'if type == "array" and length > 0 then .[0].manifest.digest // .[0].digest else .manifest.digest // .digest end' metadata.raw 2>/dev/null || echo "unknown")
                    # Recursive sum of all .size fields for total multi-arch size
                    SIZE_BYTES=$(jq -s '[.[] | .. | .size? | select(type == "number")] | add // 0' metadata.raw 2>/dev/null || echo "0")
                    if [ "$SIZE_BYTES" != "0" ] && [ "$SIZE_BYTES" != "" ]; then
                        IMAGE_SIZE="$(awk "BEGIN {print int($SIZE_BYTES/1048576)}") MB"
                    fi
                else
                    echo "⚠️ Invalid JSON metadata for $source. Metadata check skipped."
                fi
            else
                echo "⚠️ Buildx metadata inspection failed for $source."
            fi
            rm -f metadata.raw

            LOCAL_DIGEST="none"
            if docker buildx imagetools inspect "$TARGET_IMAGE" --format "{{json .Manifest}}" > local.raw 2>/dev/null; then
                 LOCAL_DIGEST=$(jq -r '.digest // "none"' local.raw 2>/dev/null || echo "none")
            fi
            rm -f local.raw
            
            if [ "$UPSTREAM_DIGEST" = "$LOCAL_DIGEST" ] && [ "$UPSTREAM_DIGEST" != "unknown" ]; then
              echo "✅ Match: $target_name"
            else
              echo "🚀 Syncing $target_name..."
              if docker pull -q "$source"; then
                docker tag "$source" "$TARGET_IMAGE"
                docker push "$TARGET_IMAGE"
                
                # Get Accurate Uncompressed Size after pull
                SIZE_BYTES=$(docker image inspect "$source" --format '{{.Size}}' 2>/dev/null || echo "0")
                if [ "$SIZE_BYTES" != "0" ]; then
                   IMAGE_SIZE="$(awk "BEGIN {print int($SIZE_BYTES/1048576)}") MB"
                fi
              else
                echo "::error::Failed to pull $source"
                echo "::endgroup::"
                continue
              fi
            fi
            
            # Dashboard Sync
            ITEM_DATA=$(echo "$BOARD_ITEMS" | jq -c ".[] | select(.fieldValues.nodes[].text? == \"$target_name\")" | head -n 1)
            ITEM_ID=$(echo "$ITEM_DATA" | jq -r ".id // empty")
            IS_ARCHIVED=$(echo "$ITEM_DATA" | jq -r ".isArchived // false")

            if [ -n "$ITEM_ID" ] && [ "$IS_ARCHIVED" = "true" ]; then
                echo "🔓 Unarchiving $target_name..."
                gh api graphql -f query='mutation($p:ID!,$i:ID!){unarchiveProjectV2Item(input:{projectId:$p,itemId:$i}){item{id}}}' -f p=$PROJECT_ID -f i=$ITEM_ID --silent || true
            fi

            if [ -z "$ITEM_ID" ]; then
              echo "✨ Auto-Discover: Adding $target_name to board..."
              ITEM_ID=$(gh api graphql -f query='
                mutation($project: ID!, $title: String!) {
                  addProjectV2DraftIssue(input: {projectId: $project, title: $title}) {
                    projectItem { id }
                  }
                }' -f project=$PROJECT_ID -f title="$target_name" --jq '.data.addProjectV2DraftIssue.projectItem.id' 2>/dev/null || echo "")
            fi

            if [ -n "$ITEM_ID" ]; then
                SHORT_SHA=$(echo $UPSTREAM_DIGEST | cut -c1-12)
                echo "Updating Dashboard values..."
                gh api graphql -f query='
                  mutation($p:ID!,$i:ID!,$f1:ID!,$v1:String!,$f2:ID!,$v2:String!,$f3:ID!,$v3:String!) {
                    m1: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f1,value:{text:$v1}}){projectV2Item{id}}
                    m2: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f2,value:{text:$v2}}){projectV2Item{id}}
                    m3: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f3,value:{text:$v3}}){projectV2Item{id}}
                  }' -f p=$PROJECT_ID -f i=$ITEM_ID -f f1=$SYNC_FIELD -f v1="$NOW" -f f2=$SHA_FIELD -f v2="$SHORT_SHA" -f f3=$SIZE_FIELD -f v3="$IMAGE_SIZE" --silent || echo "::warning::Failed to update dashboard fields for $target_name"
            fi

            docker rmi "$source" "$TARGET_IMAGE" 2>/dev/null || true
            echo "::endgroup::"
            
          done < mirror-list.txt

          # Cleanup
          echo "Performing board cleanup..."
          MIRROR_NAMES=$(grep -v "^#" mirror-list.txt | cut -d'|' -f2 | xargs)
          echo "$BOARD_ITEMS" | jq -c ".[]" | while read item; do
            ITEM_NAME=$(echo "$item" | jq -r ".fieldValues.nodes[].text" | grep -v "^$" | head -n 1)
            ITEM_ID=$(echo "$item" | jq -r ".id")
            if ! echo "$MIRROR_NAMES" | grep -qx "$ITEM_NAME"; then
               if [ "$ITEM_NAME" != "Core Mirror Engine" ] && [ -n "$ITEM_NAME" ]; then
                 echo "🗑️ Archiving orphaned item: $ITEM_NAME"
                 gh api graphql -f query='mutation($p:ID!,$i:ID!){archiveProjectV2Item(input:{projectId:$p,itemId:$i}){item{id}}}' -f p=$PROJECT_ID -f i=$ITEM_ID --silent || true
               fi
            fi
          done
