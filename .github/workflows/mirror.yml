name: Mirror Engine - Catalogue Sync

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    paths:
      - 'mirror-list.txt'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      repository-projects: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: subtleazn
          password: ${{ secrets.ORG_MIRROR_TOKEN }}

      - name: Mirror & Dashboard Catalogue
        env:
          GH_TOKEN: ${{ secrets.ORG_MIRROR_TOKEN }}
          PROJECT_ID: "PVT_kwDOA4eG_84BS-up"
          SYNC_FIELD: "PVTF_lADOA4eG_84BS-upzhAXSzs"
          SHA_FIELD: "PVTF_lADOA4eG_84BS-upzhAYC0I"
          SIZE_FIELD: "PVTF_lADOA4eG_84BS-upzhAYC0M"
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
          
          echo "Fetching board items..."
          BOARD_ITEMS=$(gh api graphql -f query='
            query($project: ID!) {
              node(id: $project) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      fieldValues(first: 10) {
                        nodes { ... on ProjectV2ItemFieldTextValue { text } }
                      }
                    }
                  }
                }
              }
            }' -f project=$PROJECT_ID --jq '.data.node.items.nodes')

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            
            upstream=$(echo "$line" | xargs)
            
            # Path extraction
            # lscr.io/linuxserver/radarr -> linuxserver/radarr
            # postgres -> library/postgres
            CLEAN_PATH=$(echo $upstream | sed -E 's|^[^/.]+[:.][^/]+/||')
            if [[ "$upstream" != *"/"* ]]; then
               CLEAN_PATH="library/$upstream"
            fi
            
            # Target construction (Full path)
            TARGET_IMAGE="ghcr.io/pinoyseoul/$CLEAN_PATH"
            # Display name on board (using the part after the last slash but before tag)
            BASE_NAME=$(echo $CLEAN_PATH | awk -F'/' '{print $NF}' | cut -d':' -f1)
            
            echo "::group::Processing $CLEAN_PATH ($upstream)"
            
            echo "Inspecting metadata..."
            UPSTREAM_JSON=$(docker buildx imagetools inspect "$upstream" --format "{{json .}}" 2>/dev/null || echo "error")
            
            if [ "$UPSTREAM_JSON" = "error" ]; then
              echo "::error::Failed to inspect $upstream"
              echo "::endgroup::"
              continue
            fi

            UPSTREAM_DIGEST=$(echo "$UPSTREAM_JSON" | jq -s -r 'if type == "array" then .[0].manifest.digest // .[0].digest else .manifest.digest // .digest end' 2>/dev/null || echo "unknown")
            
            # Robust size calculation
            SIZE_BYTES=$(echo "$UPSTREAM_JSON" | jq -s '[.[] | .. | .size? | select(type == "number")] | add // 0' 2>/dev/null || echo "0")
            IMAGE_SIZE="N/A"
            [ "$SIZE_BYTES" -gt 0 ] && IMAGE_SIZE="$(awk "BEGIN {print int($SIZE_BYTES/1048576)}") MB"

            LOCAL_DATA=$(docker buildx imagetools inspect "$TARGET_IMAGE" --format "{{json .Manifest}}" 2>/dev/null || echo "none")
            LOCAL_DIGEST=$(echo "$LOCAL_DATA" | jq -r '.digest // empty')
            
            if [ "$UPSTREAM_DIGEST" = "$LOCAL_DIGEST" ] && [ "$UPSTREAM_DIGEST" != "unknown" ]; then
              echo "✅ Up-to-date: $CLEAN_PATH"
            else
              echo "🚀 Syncing $TARGET_IMAGE..."
              if docker pull -q "$upstream"; then
                docker tag "$upstream" "$TARGET_IMAGE"
                docker push "$TARGET_IMAGE"
              else
                echo "::error::Failed to pull $upstream"
                continue
              fi
            fi
            
            # Dashboard Sync
            ITEM_ID=$(echo "$BOARD_ITEMS" | jq -r ".[] | select(.fieldValues.nodes[].text? == \"$CLEAN_PATH\") | .id // empty" | head -n 1)

            if [ -z "$ITEM_ID" ]; then
              echo "✨ Auto-Discover: Adding $CLEAN_PATH..."
              ITEM_ID=$(gh api graphql -f query='
                mutation($project: ID!, $title: String!) {
                  addProjectV2DraftIssue(input: {projectId: $project, title: $title}) {
                    projectItem { id }
                  }
                }' -f project=$PROJECT_ID -f title="$CLEAN_PATH" --jq '.data.addProjectV2DraftIssue.projectItem.id')
            fi

            # Update Dashboard values
            SHORT_SHA=$(echo $UPSTREAM_DIGEST | cut -c1-12)
            gh api graphql -f query='
              mutation($p:ID!,$i:ID!,$f1:ID!,$v1:String!,$f2:ID!,$v2:String!,$f3:ID!,$v3:String!) {
                m1: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f1,value:{text:$v1}}){projectV2Item{id}}
                m2: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f2,value:{text:$v2}}){projectV2Item{id}}
                m3: updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f3,value:{text:$v3}}){projectV2Item{id}}
              }' -f p=$PROJECT_ID -f i=$ITEM_ID -f f1=$SYNC_FIELD -f v1="$NOW" -f f2=$SHA_FIELD -f v2="$SHORT_SHA" -f f3=$SIZE_FIELD -f v3="$IMAGE_SIZE"

            docker rmi "$upstream" "$TARGET_IMAGE" 2>/dev/null || true
            echo "::endgroup::"
          done < mirror-list.txt

          # Cleanup
          echo "Performing board cleanup..."
          MIRROR_PATHS=$(grep -v "^#" mirror-list.txt | while read img; do
             p=$(echo $img | sed -E 's|^[^/.]+[:.][^/]+/||')
             [[ "$img" != *"/"* ]] && p="library/$img"
             echo $p
          done)
          
          echo "$BOARD_ITEMS" | jq -c ".[]" | while read item; do
            ITEM_PATH=$(echo "$item" | jq -r ".fieldValues.nodes[].text" | grep -v "^$" | head -n 1)
            ITEM_ID=$(echo "$item" | jq -r ".id")
            if ! echo "$MIRROR_PATHS" | grep -qx "$ITEM_PATH"; then
               if [ "$ITEM_PATH" != "Core Mirror Engine" ]; then
                 echo "🗑️ Archiving orphaned item: $ITEM_PATH"
                 gh api graphql -f query='mutation($p:ID!,$i:ID!){archiveProjectV2Item(input:{projectId:$p,itemId:$i}){item{id}}}' -f p=$PROJECT_ID -f i=$ITEM_ID --silent || true
               fi
            fi
          done
